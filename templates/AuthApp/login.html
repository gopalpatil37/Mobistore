{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | MobiStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Optional Custom CSS -->
    <link rel="stylesheet" href="{% static 'auth/style.css' %}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">

<!-- Website Name (like Register page) -->
<a href="{% url 'home' %}" class="position-fixed top-0 start-0 m-4 fw-bold fs-4 text-warning text-decoration-none">
    MobiStore
</a>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg border-0">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold">Welcome Back</h3>
                        <p class="text-muted small">Login to your account</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                      {% for msg in messages %}
                        <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
                            {{ msg }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn btn-warning w-100 fw-bold">
                            Login
                        </button>
                        <div class="text-end mt-2">
                            <a href="{% url 'forget' %}" class="small text-decoration-none text-muted">
                                Forgot Password?
                            </a>
                        </div>
                    </form>

                    <div class="text-center mt-3 small">
                        Don’t have an account?
                        <a href="{% url 'register' %}" class="fw-bold text-decoration-none">Register</a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
