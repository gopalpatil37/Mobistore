{% extends 'staffapp/staff.html' %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/add_mobile.css' %}">
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="card mobi-card border-0">
                <div class="card-header mobi-header text-center">
                    <h4 class="mb-0">📱 Add New Mobile</h4>
                </div>

                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data" id="mobileForm">
                        {% csrf_token %}

                        <div class="row">
                            {% for field in form %}
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">
                                        {{ field.label }}
                                    </label>
                                    {{ field }}

                                    {% if field.errors %}
                                        <div class="text-danger small mt-1">
                                            {{ field.errors|striptags }}
                                        </div>
                                    {% endif %}
                                </div>
                            {% endfor %}
                        </div>

                        <div id="imgPreview" class="text-center my-3 d-none">
                            <img id="previewImg" class="img-thumbnail" width="150" alt="image">
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-mobi btn-lg">
                                Save Mobile
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
<script src="{% static 'js/add_mobile.js' %}"></script>
