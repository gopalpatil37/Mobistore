{% extends 'base.html' %}
{% block content %}

<div class="container mt-5" style="padding-bottom: 10px;">
    <h2 class="mb-4">Checkout</h2>

    <div class="row">
        <!-- Billing Form -->
        <div class="col-md-6">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Phone</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Address</label>
                    <textarea name="address" class="form-control" required></textarea>
                </div>

                <button class="btn btn-success w-100">
                    Place Order
                </button>
            </form>
        </div>

        <!-- Order Summary -->
        <div class="col-md-6">
            <div class="card p-3 shadow">
                <h5>Order Summary</h5>
                <hr>

                {% for item in cart.values %}
                <p>
                    {{ item.name }} × {{ item.quantity }}
                    <span class="float-end">
                        ₹{{ item.item_total|floatformat:2 }}
                    </span>
                </p>
                {% endfor %}

                <hr>
                <h5>
                    Total
                    <span class="float-end">
                        ₹{{ total|floatformat:2 }}
                    </span>
                </h5>
            </div>
        </div>
    </div>
</div>

{% endblock %}
