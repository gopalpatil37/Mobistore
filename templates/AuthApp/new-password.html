<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | MobiStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="card shadow p-4" style="width: 100%; max-width: 400px;">
    <h3 class="text-center mb-3">Reset Password</h3>
    <p class="text-center text-muted">Enter your new password</p>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label for="password1" class="form-label">New Password</label>
            <input type="password" id="password1" name="password1" class="form-control" placeholder="Enter new password" required>
        </div>

        <div class="mb-3">
            <label for="password2" class="form-label">Confirm Password</label>
            <input type="password" id="password2" name="password2" class="form-control" placeholder="Confirm password" required>
        </div>

        {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <button type="submit" class="btn btn-warning w-100">Reset Password</button>
    </form>
</div>

</body>
</html>
