{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | MobiStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'auth/style.css' %}">
</head>

<body>

<a href="{% url 'home' %}" class="auth-logo">MobiStore</a>

<div class="auth-wrapper">
    <div class="auth-card">

        <h3>Create MobiStore Account</h3>

        <form method="post">
            {% csrf_token %}

            <label>Username</label>
            {{ form.username }}

            <label>Email</label>
            {{ form.email }}
            <div class="auth-help">
                Letters, numbers and @ / . + - _ allowed.
            </div>

            <label>Password</label>
            {{ form.password1 }}

            <div class="auth-help">
                Must be at least 8 characters and not too common.
            </div>

            <label>Confirm Password</label>
            {{ form.password2 }}

            <button class="auth-btn" type="submit">Register</button>

            <div class="auth-footer">
                Already have an account?
                <a href="{% url 'login' %}">Login</a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
