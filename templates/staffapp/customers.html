{% extends 'staffapp/staff.html' %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/add_mobile.css' %}">
{% block content %}
 <h1>All Customers</h1>
 <div>
    <table class="table table-dark table-striped shadow">
        <tr>
            <th>Name</th>
            <th>Email</th>
        </tr>
        {% for u in users %}
        <tr>
            <td>{{u.username}}</td>
            <td>{{u.email}}</td>
        </tr>
        {% endfor %}
    </table>
 </div>
{% endblock %}
<script src="{% static 'js/add_mobile.js' %}"></script>
